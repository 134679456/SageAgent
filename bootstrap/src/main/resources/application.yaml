server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ragent-producer${unique-name:}_pg
    send-message-timeout: 2000

milvus:
  uri: http://localhost:19530

rag:
  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    summary-max-chars: 200
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
        rerank: /v1/rerank

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: deepseek-v4-pro
    deep-thinking-model: deepseek-v4-pro
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: deepseek-v4-pro
        provider: bailian
        model: deepseek-v4-pro
        supports-thinking: true
        priority: 3
      - id: deepseek-v4-flash
        provider: siliconflow
        model: deepseek-ai/DeepSeek-V4-Flash
        supports-thinking: true
        priority: 0
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2

  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: ${rag.default.dimension}
        priority: 2

#⚔️ 模型对比：纯文本任务的性能与能力差异
  #对比维度	qwen3-vl-rerank	  qwen3-rerank	 主要影响
  #🏆 核心基准测试	在多语言文本嵌入基准 (MMTEB) 上，多模态模型的Embedding部分评分（67.9-69.4）略低于纯文本模型（70.58-74.3）。	其8B模型曾以70.58分在MTEB多语言榜单登顶全球第一。	单看召回阶段的向量表征能力，纯文本模型仍是极致文本精度的首选。
  #🧩 底层架构	多模态底座，为处理图片、视频等多模态信息而生。	纯文本底座，所有参数专门用于文本语义理解。	核心能力不同，一个为多模态而生，一个专注纯文本。
  #📈 重排序(Rerank)能力	处理图文混合文档时精确度更高，具备跨模态理解能力。	精确度极高，同样能大幅提升最终检索精度。	在纯文本情景下，两者都能提供高质量的重排序，差距并不显著。
  #🌐 语言与API限制	支持约30+种语言；单篇文档最大8000 tokens，单次请求最多100个文档。	支持超过100种语言；单篇文档最大4000 tokens，单次请求最多500个文档。	qwen3-vl-rerank 语言支持范围小、单次处理文档上限低，是其明显短板。
  rerank:
    default-model: Qwen/Qwen3-Reranker-8B
    candidates:
      - id: Qwen/Qwen3-Reranker-8B
        provider: siliconflow
        model: Qwen/Qwen3-Reranker-8B
        priority: 1
      - id: Qwen/Qwen3-VL-Reranker-8B
        provider: siliconflow
        model: Qwen/Qwen3-VL-Reranker-8B
        priority: 2
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false
